# Variables are considered subroutines. They are immutable
# main
- main:
  # variable called foo
  - foo:
    # calling a subroutine explicitly with 0 arguments, and acquiring its value
    - zero: []
  # same thing!
  - foo: zero
  # return value of foo
  - foo: []
# declare data, returning 10
- data: 10
# use zero explicitly
- zero: []
# use func with arguments
- func: ['goo']
# use func with nested statements
- func: [
    'goo', 
    { bar: [10, 10] },
    bar: [5, 10],
    ]
# declare cpy2, returning data
- cpy2: data

- zero:
  - 0

- zero: 0

    